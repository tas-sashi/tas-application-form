<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply for VLSI Frontend Training — T.A.S</title>
    <script>
      (function() {
        var LANDING_URL = 'https://www.advanceskilltrust.in/pre-application.html';

        // Skip gate check in local development
        if (window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1') {
          return;
        }
    
        try {
          var params = new URLSearchParams(window.location.search);
          var ref = params.get('ref');
    
          if (ref) {
            // Came from landing page — store in sessionStorage and clean URL
            sessionStorage.setItem('tas_ref', ref);
            // Remove ref from URL without reloading
            window.history.replaceState({}, '', window.location.pathname);
            return; // Allow form to load
          }
    
          // Check sessionStorage for returning users within same session
          var stored = sessionStorage.getItem('tas_ref');
          if (stored) {
            return; // Allow form to load
          }
    
          // No ref, no session — redirect to landing page
          window.location.replace(LANDING_URL);
    
        } catch(e) {
          window.location.replace(LANDING_URL);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
