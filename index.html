<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply for VLSI Frontend Training — T.A.S</title>
    <script>
      (function() {
        var LANDING_URL = 'https://www.advanceskilltrust.in/pre-application.html';
    
        try {
          var raw = localStorage.getItem('tas_landing_seen');
    
          if (!raw) {
            window.location.replace(LANDING_URL);
            return;
          }
    
          var data = JSON.parse(raw);
    
          if (!data.expiry || Date.now() > data.expiry) {
            localStorage.removeItem('tas_landing_seen');
            window.location.replace(LANDING_URL);
            return;
          }
          // Flag valid — allow React to load normally
    
        } catch(e) {
          // Any error — redirect to landing page
          window.location.replace(LANDING_URL);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
